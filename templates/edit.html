<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f7ff;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .card {
            border-radius: 12px;
            border: 1px solid #c9e0f8;
            box-shadow: 0 2px 8px rgba(30, 100, 200, 0.08);
            background: #ffffff;
        }
        .alert {
            border-radius: 10px;
            border: none;
            background-color: #e6f0fc;
            color: #235796;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #b8d4f0;
        }
        .btn {
            border-radius: 8px;
        }
        .btn-secondary, .btn-outline-secondary {
            background-color: #4088d8;
            color: #fff;
            border-color: #4088d8;
        }
        .btn-outline-secondary:hover {
            background-color: #2e75c2;
            color: #fff;
        }
        .text-secondary {
            color: #235796 !important;
        }
    </style>
</head>
<body class="container py-4">
    <h2 class="text-center text-secondary mb-4">修改记账记录</h2>

    <div class="alert text-center py-3">
        {{mood}}
    </div>

    <div class="card p-5 mx-auto" style="max-width: 700px;">
        <form action="/update/{{record[0]}}" method="post">
            <div class="mb-4">
                <label class="form-label text-secondary">收支类型</label>
                <select name="type" class="form-select">
                    <option value="支出" {% if record[1]=='支出' %}selected{% endif %}>支出</option>
                    <option value="收入" {% if record[1]=='收入' %}selected{% endif %}>收入</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">金额</label>
                <input type="number" step="0.01" name="money" value="{{record[2]}}" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">消费分类</label>
                <select name="category" class="form-select">
                    <option>餐饮</option>
                    <option>购物</option>
                    <option>交通</option>
                    <option>娱乐</option>
                    <option>房租</option>
                    <option>工资</option>
                    <option>其他</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">备注</label>
                <input type="text" name="remark" value="{{record[4]}}" class="form-control">
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">记录时间</label>
                <input type="datetime-local" name="create_time" value="{{record[5]}}" class="form-control" required>
            </div>
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-secondary flex-grow-1">保存修改</button>
                <a href="/" class="btn btn-outline-secondary flex-grow-1">返回首页</a>
            </div>
        </form>
    </div>

</body>
</html>
