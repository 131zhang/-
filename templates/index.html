<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人情绪记账本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f7ff;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .card {
            border-radius: 12px;
            border: 1px solid #c9e0f8;
            box-shadow: 0 2px 8px rgba(30, 100, 200, 0.08);
            background: #ffffff;
            margin-bottom: 20px;
        }
        .alert {
            border-radius: 10px;
            border: none;
            background-color: #e6f0fc;
            color: #235796;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #b8d4f0;
        }
        .btn {
            border-radius: 8px;
            border: none;
        }
        .btn-secondary, .btn-outline-secondary {
            background-color: #4088d8;
            color: #fff;
            border-color: #4088d8;
        }
        .btn-outline-secondary:hover {
            background-color: #2e75c2;
            color: #fff;
        }
        table {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #c9e0f8;
        }
        .table thead {
            background-color: #e6f0fc;
        }
        .text-secondary {
            color: #235796 !important;
        }
    </style>
</head>
<body class="container py-4">
    <h2 class="text-center text-secondary mb-4">个人情绪记账本</h2>

    <!-- 情绪文案 -->
    <div class="alert text-center py-3">
        {{mood}}
    </div>

    <!-- 预算 & 今日收支 -->
    <div class="card p-4">
        <h5 class="text-secondary mb-3">月度预算管理</h5>
        <form action="/set_budget" method="post" class="d-flex gap-3 align-items-center">
            <input type="number" step="0.01" name="budget" value="{{budget}}" class="form-control flex-grow-1" required>
            <button class="btn btn-outline-secondary px-4">更新预算</button>
        </form>
        <div class="mt-3 pt-3 border-top text-muted">
            <span>今日收支合计：<strong class="text-dark">{{today_money}} 元</strong></span>
            <span class="ms-4">当前预算：<strong class="text-dark">{{budget}} 元</strong></span>
        </div>
    </div>

    <!-- 新增记录 -->
    <div class="card p-4">
        <h5 class="text-secondary mb-3">添加收支记录</h5>
        <form action="/add" method="post">
            <div class="row g-3">
                <div class="col-lg-2 col-md-4">
                    <select name="type" class="form-select" required>
                        <option value="支出">支出</option>
                        <option value="收入">收入</option>
                    </select>
                </div>
                <div class="col-lg-2 col-md-4">
                    <input type="number" step="0.01" name="money" placeholder="金额" class="form-control" required>
                </div>
                <div class="col-lg-2 col-md-4">
                    <select name="category" class="form-select" required>
                        <option>餐饮</option>
                        <option>购物</option>
                        <option>交通</option>
                        <option>娱乐</option>
                        <option>房租</option>
                        <option>工资</option>
                        <option>其他</option>
                    </select>
                </div>
                <div class="col-lg-2 col-md-4">
                    <input type="text" name="remark" placeholder="备注" class="form-control">
                </div>
                <div class="col-lg-2 col-md-4">
                    <input type="datetime-local" name="create_time" class="form-control" required>
                </div>
                <div class="col-lg-2 col-md-4">
                    <button type="submit" class="btn btn-secondary w-100">添加记录</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 功能入口 -->
    <div class="d-flex gap-3 mb-4">
        <a href="/stat" class="btn btn-outline-secondary">收支总统计</a>
        <a href="/pie" target="_blank" class="btn btn-outline-secondary">分类饼状图</a>
    </div>

    <!-- 记录列表 -->
    <div class="card p-4">
        <h5 class="text-secondary mb-3">全部记账记录</h5>
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>类型</th>
                    <th>金额(元)</th>
                    <th>分类</th>
                    <th>备注</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for r in records %}
                <tr>
                    <td>{{r[1]}}</td>
                    <td>{{r[2]}}</td>
                    <td>{{r[3]}}</td>
                    <td>{{r[4]}}</td>
                    <td>{{r[5]}}</td>
                    <td>
                        <a href="/edit/{{r[0]}}" class="btn btn-sm btn-outline-secondary me-2">修改</a>
                        <a href="/delete/{{r[0]}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除该记录？')">删除</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
